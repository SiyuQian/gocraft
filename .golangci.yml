version: "2"
run:
  timeout: 5m
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    errcheck:
      # Writes to stdout/stderr are advisory; checking them adds noise without value.
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
  exclusions:
    rules:
      # The acceptance test is gated behind a build tag and not built by default.
      - path: internal/generate/acceptance_test.go
        linters: [unused]
